name: Auto Post to Facebook

on:
  schedule:
    - cron: '0 8,14,20 * * *'
  workflow_dispatch: 

jobs:
  post-video:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Dependencies
        working-directory: ./fb_shorts_bot
        run: npm install
      - name: Run Automation Script
        working-directory: ./fb_shorts_bot
        env:
          FB_PAGE_ID_1: ${{ secrets.FB_PAGE_ID_1 }}
          FB_PAGE_TOKEN_1: ${{ secrets.FB_PAGE_TOKEN_1 }}
          YOUTUBE_CHANNEL_URL_1: ${{ secrets.YOUTUBE_CHANNEL_URL_1 }}
          FB_PAGE_ID_2: ${{ secrets.FB_PAGE_ID_2 }}
          FB_PAGE_TOKEN_2: ${{ secrets.FB_PAGE_TOKEN_2 }}
          YOUTUBE_CHANNEL_URL_2: ${{ secrets.YOUTUBE_CHANNEL_URL_2 }}
        run: npm start
      - name: Commit and Push History
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update fb_shorts_bot/history.json with newly posted videos"
          file_pattern: fb_shorts_bot/history.json
